<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Callgraph Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ============================================================================ 
 * Baseline Styling
 * ============================================================================
 */

*{
    box-sizing    :   border-box;
    margin      :   0;
    padding     :   0
}
body{
    display     : flex;
    height      : 100vh;
    overflow    : hidden;
    font-family : 'Cascadia Mono',monospace;
    background  : #0d1117;
    color       : #c9d1d9
}

/* ============================================================================ 
 * Sidebar Styling
 * ============================================================================
 */
#sidebar{
    width       :   260px       ;   min-width       : 160px;
    display     :   flex        ;   flex-direction  : column;
    background  :   #161b22   ;   border-right    : 1px solid #30363d
}

#sidebar_header{
    padding         : 1rem 0.4rem 1rem 0.4rem;
    border-bottom   : 1px solid #30363d
}
#sidebar_title{
    font-size       :   1.2rem  ;    font-weight    : bold;
    margin-bottom   :   8px     ;    color          : #8db1ff
}

/* ---------------------------------------------------------------------------- 
 * Search Styling
 * ----------------------------------------------------------------------------
 */
#search{
    width           : 100%      ;   padding         : 0.2rem 0.4rem;
    background      : #0d1117 ;   border          : 0.1rem solid #30363d;
    color           : #c9d1d9 ;   border-radius   : 0.3rem;
    font-size       : 1.5rem    ;   font            : inherit
}

#search:focus{
    outline         : none;
    border-color    : #4c5770
}

/* ---------------------------------------------------------------------------- 
 * Package List Styling
 * ----------------------------------------------------------------------------
 */
#pkg-list{
    overflow-y      : auto;
    flex            : 1
}

.pkg-item{
    padding           : 0.2rem 0.4rem;
    cursor            : pointer;
    font-size         : 0.8rem;
    border-bottom     : 1px solid #21262d;
    white-space       : nowrap;
    overflow          : hidden;
    text-overflow     : ellipsis;
    color             : #8b949e
}
.pkg-item:hover{
    background      : #21262d;
    color           : #c9d1d9
}
.pkg-item.active{
    background      : #4c5770;
    color           : #fff
}

.pkg-group { 
    border-bottom: 1px solid #21262d; 
}

.pkg-group-summary {
    padding     : 4px 8px   ; cursor        : pointer; 
    font-size   : 0.7rem    ; color         : #606872; 
    background  : #161b22 ; user-select   : none;
    display     : flex      ; align-items   : center; 
    gap         : 4px       ; list-style    : none;
}
.pkg-group-summary::-webkit-details-marker {
     display: none;
}

.pkg-group-summary::before {
    content     : "▶"             ; font-size   : 0.55rem; 
    transition  : transform 0.15s ; display     : inline-block;
}

details[open] > .pkg-group-summary::before { 
    transform: rotate(90deg);
}

.pkg-group-summary:hover { 
    color       : #8b949e; 
    background  : #1c2128; 
}
.pkg-group-count {
    margin-left : auto      ; font-size     : 0.6rem;
    background  : #21262d ; border-radius : 8px; 
    padding     : 0px 6px   ; color         : #484f58;
}


/* ============================================================================ 
 * Main Component Styling
 * ============================================================================
 */
#main{
    flex            : 1     ;   display     : flex;
    flex-direction  : column;   overflow    : hidden
}

#topbar{
    display       : flex      ; align-items     : center;
    gap           : 0.6rem    ; justify-content : space-between;
    min-height    : 44px      ; background      : #161b22;
    border-bottom : 1px solid #30363d
}

#leftbar {
    margin-left: 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
    min-width: 0;
}

#centerbar {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    flex: 0 1 auto;
    padding: 0 1rem;
    height: 100%;
}

#rightbar {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-end;
    flex: 1; 
    min-width: 0;
}

/* ---------------------------------------------------------------------------- 
 * Back & Forward Buttons Styling
 * ----------------------------------------------------------------------------
 */
.tab {
    padding         : 6px 16px;
    cursor          : pointer;
    font-size       : 0.8rem;
    color           : #8b949e;
    background      : #0d1117;
    border          : 1px solid #30363d;
    border-bottom   : none;
    border-radius   : 6px 6px 0 0;
    margin-right    : 4px;
    transition      : background 0.2s, color 0.2s;
    position        : relative;
    top             : 1px;
    opacity         : .4;
}

.tab:hover {
    color       : #c9d1d9;
    background  : #161b22;
}

.tab.active {
    color       : #ffffff;
    background  : #0d1117;
    border-color: #30363d;
    font-weight : bold;
    opacity     : 1;
}

.tab.active::after {
    content     : "";
    position    : absolute;
    bottom      : -2px;
    left        : 0;
    right       : 0;
    height      : 2px;
    background  : #0d1117;
    opacity     : 1;
}

/* ---------------------------------------------------------------------------- 
 * Back & Forward Buttons Styling
 * ----------------------------------------------------------------------------
 */
.nav_button{
    padding       : 0.2rem 0.7rem;
    background    : #21262d;
    border        : 1px solid #30363d;
    color         : #c9d1d9;
    cursor        : pointer;
    border-radius : 0.2rem;
    font-family   : 'Cascadia Mono',monospace;
    font-size     : 0.6rem;
    height        : 100%
}

.nav_button:hover:not(:disabled) {
    color         : #ffffff;
}

.nav_button:disabled {
    background      : #161b22; 
    border          : 1px solid #21262d;
    color           : #484f58;
    cursor          : default;
    opacity         : 0.6;
}

#home_btn {
    font-size       : 1rem;
}
/* ---------------------------------------------------------------------------- 
 * Current Package Field Styling
 * ----------------------------------------------------------------------------
 */
#curr_package{
    flex          : 1         ; font-size     : 11px;
    color         : #8b949e ; overflow      : hidden;
    text-overflow : ellipsis  ; white-space   : nowrap
}

/* ---------------------------------------------------------------------------- 
 * Zoom Styling
 * ----------------------------------------------------------------------------
 */
#zoom-controls{
    display     : flex;
    gap         : 4px;
    margin-right: 1rem
}
.zbtn{
    padding         : 2px 8px;
    background      : #21262d;
    border          : 1px solid #30363d;
    color           : #c9d1d9;
    cursor          : pointer;
    border-radius   : 4px;
    font-size       : 13px;
    line-height     : 1.4;
    font-family     : 'Cascadia Mono',monospace
}
  
.zbtn:hover{
    background      : #30363d
}

#hint{
    font-size       : 0.6rem;
    color           : #606872;
    white-space     : nowrap;
    font-family     : 'Cascadia Mono',monospace;
    margin-right    : 1rem;
    text-overflow   : ellipsis;
    overflow        : hidden;
}

/* ============================================================================ 
 * SVG Canvas Styling
 * ============================================================================
 */
#canvas{
    flex        :1          ; overflow  : hidden;
    position    :relative   ; cursor    : default; 
    background  : #0d1117
}

#wrapper{
    position    : absolute;     top              : 0;
    left        : 0;            transform-origin : 0 0
}
#wrapper svg{
    display:block
}

#empty{
    position          : absolute  ;   inset           : 0;
    display           : flex      ;   align-items     : center;
    color             : #484f58 ;   font-size       : 1.2rem;
    justify-content   : center    ;   pointer-events  : none
}


/* ============================================================================ 
 * Stats Panel
 * ============================================================================
 */
#stats-panel {
    flex        : 1           ; overflow-y : auto; 
    background  : #0d1117   ; padding    : 1.2rem 1.5rem ; 
    display     : none;
}
.stats-title {
    font-size       : 0.85rem   ; font-weight   : bold; 
    color           : #c9d1d9 ; padding-bottom: 0.6rem;
    margin-bottom   : 1rem      ; display       : flex; 
    align-items     : center    ; gap           : 0.5rem;
    border-bottom   : 1px solid #21262d;
}
.badge {
    font-size       : 0.65rem   ; background    : #21262d; 
    color           : #8b949e ; border-radius : 3px; 
    padding         : 1px 8px   ; border        : 1px solid #30363d; 
}

/* ---------------------------------------------------------------------------- 
 * Stat Card Styling
 * ----------------------------------------------------------------------------
 */
.cards { 
    display     : flex  ; gap           : 0.7rem; 
    flex-wrap   : wrap  ; margin-bottom : 1rem; 
}
.card {
    flex        : 1         ; min-width     : 100px;
    background  : #161b22 ; border-radius : 5px; 
    padding     : 0.7rem 0.9rem;
    border      : 1px solid #21262d; 
}
.card-val { 
    font-size   : 1.7rem    ; font-weight : bold; 
    color       : #8db1ff ; line-height : 1; 
}
.card-lbl { 
    font-size       : 0.6rem    ; color         : #8b949e; 
    text-transform  : uppercase ; letter-spacing: 0.06em; 
    margin-top      : 3px;
}
.card-sub { 
    font-size       : 0.58rem   ; color     : #484f58; 
    margin-top      : 1px;
}

.c-green  .card-val { color: #6fdd8b; }
.c-orange .card-val { color: #f0a24b; }
.c-purple .card-val { color: #c97bfc; }

/* ---------------------------------------------------------------------------- 
 * Chart Boxes Styling
 * ----------------------------------------------------------------------------
 */
.chart-row { 
    display     : grid; gap             : 0.7rem;
    margin-bottom   : 1rem;
    grid-template-columns: 1fr 2fr;
}
.chart-box {
    background   : #161b22  ; border    : 1px solid #21262d;
    border-radius: 5px        ; padding   : 0.8rem; 
    flex         : 1          ; min-width : 220px;
}
.chart-box h3 {
    font-size     : 0.62rem   ; text-transform : uppercase; 
    letter-spacing: 0.07em    ; color          : #606872; 
    margin-bottom : 0.7rem    ; font-weight    : normal;
}



/* ---------------------------------------------------------------------------- 
 * Reachability Bar Styling
 * ----------------------------------------------------------------------------
 */
.reach-track { 
    height        : 20px; 
    border-radius : 4px; 
    overflow      : hidden; 
    display       : flex; 
    margin-bottom : 4px; 
}

.reach-green  { background: #6fdd8b; }
.reach-orange { background: #f0a24b; }

.reach-labels { 
    display         : flex; 
    justify-content : space-between; 
    font-size       : 0.6rem; 
    color           : #8b949e; 
}
/* ---------------------------------------------------------------------------- 
 * Package Table Styling
 * ----------------------------------------------------------------------------
 */
.pkg-table-wrap {
    background    : #161b22; 
    border        : 1px solid #21262d;
    border-radius : 5px; 
    overflow      : hidden; 
    margin-bottom : 1rem;
}

.pkg-table-wrap h3 {
    font-size      : 0.62rem; 
    text-transform : uppercase; 
    letter-spacing : 0.07em;
    color          : #606872; 
    padding        : 0.5rem 0.8rem;
    border-bottom  : 1px solid #21262d; 
    font-weight    : normal;
}

table { 
    width           : 100%; 
    border-collapse : collapse; 
    font-size       : 0.72rem; 
}

th {
    background     : #1c2128; 
    color          : #606872; 
    padding        : 4px 10px; 
    text-align     : left;
    font-weight    : normal; 
    font-size      : 0.6rem; 
    text-transform : uppercase;
    letter-spacing : 0.05em; 
    border-bottom  : 1px solid #21262d;
}

th.r, td.r { text-align: right; }

td { 
    padding    : 3px 10px; 
    border-top : 1px solid #1c2128; 
    color      : #8b949e; 
    white-space: nowrap; 
}

tr:hover td { background: #1c2128; }

.pkg-link { 
    color         : #8db1ff ;  cursor        : pointer; 
    max-width     : 320px     ;  overflow      : hidden; 
    text-overflow : ellipsis  ;  display       : block; 
}

.pkg-link:hover { text-decoration: underline; }

.pill-bad { 
    background    : #3d2400;  color         : #f0a24b; 
    border-radius : 3px      ;  padding       : 1px 6px; 
    font-size     : 0.6rem; 
}

.pill-good { 
    background    : #0d2318;    color       : #6fdd8b; 
    border-radius : 3px      ;    padding     : 1px 6px; 
    font-size     : 0.6rem; 
}
/* ---------------------------------------------------------------------------- 
 * Unused list
 * ----------------------------------------------------------------------------
 */
.unused-list { 
    display        : flex; 
    flex-direction : column; 
    gap            : 3px; 
    max-height     : 200px; 
    overflow-y     : auto; 
}

.unused-fn {
    font-size     : 0.72rem; 
    color         : #f0a24b; 
    background    : #1e1400;
    border        : 1px solid #3d2400; 
    border-radius : 3px; 
    padding       : 2px 8px;
}

.no-issues { 
    font-size : 0.8rem; 
    color     : #6fdd8b; 
    padding   : 4px 0; 
}

.no-data { 
    font-size  : 0.75rem; 
    color      : #484f58; 
    text-align : center; 
    padding    : 1rem 0; 
}

.chart-box canvas { max-height: 200px; }
#ch-indirect      { max-height: 340px; }
/* ---------------------------------------------------------------------------- 
 * Indirect Edges Statistics
 * ----------------------------------------------------------------------------
 */

.c-blue .card-val { color: #8db1ff; }
.research-grid {
    display               : grid;
    grid-template-columns : 3fr 2fr;
    gap                   : 0.7rem;
    margin-bottom         : 0.7rem;
    height                : 15rem;
}

.research-grid .pkg-table-wrap {
    margin-bottom : 0;
    display       : flex;
    flex-direction: column;
    overflow      : hidden;
}

.research-grid .sig-wrap {
    flex        : 1;
    overflow-y  : auto;
    overflow-x  : hidden;
}

.research-grid .chart-box {
    display        : flex;
    flex-direction : column;
    overflow       : hidden;
}

.research-grid .chart-box canvas {
    flex       : 1;
    max-height : none;
    min-height : 0;
}
.sig-table {
    font-family             : 'Cascadia Mono', monospace;
    font-size               : 0.65rem !important;
}
.sig-text {
    max-width               : 400px;
    overflow                : hidden;
    text-overflow           : ellipsis;
    display                 : block;
    color                   : #c9d1d9;
}

</style>
</head>
<body>


<!-- 
 - ============================================================================
 - Side Bar Components
 - ============================================================================
/ -->
<div id="sidebar">
    <div id="sidebar_header">
        <div id="sidebar_title"> Packages</div>
            <input 
                id="search" 
                type="text" 
                placeholder="🔍︎"
                oninput="filterPkgs(this.value)"
            >
        </div>
    <div id="pkg-list">{{PACKAGE_LIST}}    </div>
</div>

<!-- 
 - ============================================================================
 - Main Components
 - ============================================================================
/ -->
<div id="main">
    <div id="topbar">
        <!-- 
          - -------------------------------------------------------------------
          - Left Component
          - -------------------------------------------------------------------
        / -->
        <div id="leftbar">
            <button 
                class="nav_button" id="back_btn" onclick="goBack()"  disabled>
                ⬅ Back
            </button>
            <button 
                class="nav_button" id="fwd_btn"    onclick="goFwd()" disabled>
                Fwd ➡</button>
            <button 
                class="nav_button" id="home_btn"   onclick="goHome()" active>
                🏠︎
            </button>

            <div id="curr_package">
                select a package from the sidebar
            </div>
        </div>
        <!-- 
          - -------------------------------------------------------------------
          - Middle Component
          - -------------------------------------------------------------------
        / -->
        <div id="centerbar">
            <div 
                class="tab active" id="tab-graph" onclick="switchTab('graph')">
                ▣ Graph
            </div>
            <div 
                class="tab" id="tab-stats" onclick="switchTab('stats')">
                ∑ Stats
            </div>
        </div>
        
        <!-- 
          - -------------------------------------------------------------------
          - Right Component
          - -------------------------------------------------------------------
        / -->
        <div id="rightbar">
            <div id="zoom-controls">
                <button class="zbtn" onclick="zoom(1.2)"   title="Zoom in"    >
                    +
                </button>
                <button class="zbtn" onclick="zoom(0.8)"   title="Zoom out"   >
                    -
                </button>
                <button class="zbtn" onclick="resetView()" title="Reset view" >
                    ⟳
                </button>
            </div>
            <div id="hint"> 
                scroll=zoom | drag=pan | click ext-node=navigate 
            </div>
        </div>
    </div>
    <!-- SVG graph canvas -->
    <div id="canvas">
        <div id="empty">⤾ select a package from the sidebar</div>
        <div id="wrapper"></div>
    </div>

    <!-- Stats panel (toggled with the ∑ Stats tab) -->
    <div id="stats-panel"></div>
</div>

<script>

/* ============================================================================ 
 * Functions
 * ============================================================================
 */

const svgData    = `{{SVG_DATA_JSON}}`;
const stats      = JSON.parse(`{{STATS_DATA_JSON}}`); 
const svgDataObj = JSON.parse(svgData);
/* ============================================================================ 
 * Navigation
 * ============================================================================
 */

let     current     = null;
const   backStack   = [];
const   fwdStack    = [];

/* ============================================================================ 
 * Zoom State
 * ============================================================================
 */

let scale       = 1     , px = 0, py = 0;
let dragging    = false , lx = 0, ly = 0;

const canvas        = document.getElementById('canvas');
const wrapper       = document.getElementById('wrapper');
const empty         = document.getElementById('empty');
const statsPanel    = document.getElementById('stats-panel');


/* ============================================================================ 
 * Dispatcher
 * ============================================================================
 */

function renderStats(pkg) {
    destroyCharts();
    if (!pkg) {
        renderHomeStats();
    } else {
        renderPkgStats(pkg);
    }
}

/* ============================================================================ 
 * Transform
 * ============================================================================
 */

function applyTransform() {
    wrapper.style.transform = 'translate('+px+'px,'+py+'px) scale('+scale+')';
}

function resetView() {
    scale = 1; px = 24; py = 24;
    applyTransform();
}

/* ============================================================================ 
 * Zoom Towards Point
 * ============================================================================
 */
function zoom(factor, cx, cy) {
    const r = canvas.getBoundingClientRect();
    cx = (cx !== undefined) ? cx : r.width  / 2;
    cy = (cy !== undefined) ? cy : r.height / 2;
    px = cx - (cx - px) * factor;
    py = cy - (cy - py) * factor;
    scale *= factor;
    applyTransform();
}


/* ============================================================================ 
 * Mouse Events
 * ============================================================================
 */
canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    zoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

canvas.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    dragging = true; lx = e.clientX; ly = e.clientY;
    canvas.classList.add('grabbing');
});

window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    px += e.clientX - lx; py += e.clientY - ly;
    lx = e.clientX; ly = e.clientY;
    applyTransform();
});

window.addEventListener('mouseup', function() {
    dragging = false;
    canvas.classList.remove('grabbing');
});

/* ============================================================================ 
 * Navigation
 * ============================================================================
 */
function syncButtons() {
    const isHome = (current === null);
    
    // Standard .disabled property for all three
    document.getElementById('back_btn').disabled = backStack.length === 0;
    document.getElementById('fwd_btn').disabled  = fwdStack.length  === 0;
    document.getElementById('home_btn').disabled = isHome;
}

function switchPackage(pkg, pushBack = true) {
    if (!(pkg in svgDataObj)) { console.warn('no SVG for', pkg); return; }

    if (pushBack) {
        backStack.push(current);
        fwdStack.length = 0;
    }

    current = pkg;
    empty.style.display = 'none';
    wrapper.innerHTML = svgDataObj[pkg];
    
    switchTab('graph'); 
    
    resetView();

    document.querySelectorAll('.pkg-item').forEach(el => {
        el.classList.toggle('active', el.dataset.pkg === pkg);
    });

    document.getElementById('curr_package').textContent = pkg;
    document.getElementById('curr_package').title = pkg;
    syncButtons();
}

function goBack() {
    if (backStack.length === 0) return;
    fwdStack.push(current);
    
    const previous = backStack.pop();
    if (previous === null) {
        goHome(false);
    } else {
        switchPackage(previous, false);
    }
}

function goFwd() {
    if (fwdStack.length === 0) return;
    backStack.push(current);
    
    const next = fwdStack.pop();
    if (next === null) {
        goHome(false);
    } else {
        switchPackage(next, false);
    }
}

function goHome(pushBack = true) {
    if (current === null) return; // Already there

    if (pushBack) {
        backStack.push(current);
        fwdStack.length = 0;
    }

    current = null;
    empty.style.display = 'flex';
    wrapper.innerHTML = '';
    document.getElementById('curr_package').textContent = 
        'select a package from the sidebar';
    document.getElementById('curr_package').title = '';
    
    document.querySelectorAll('.pkg-item').forEach(
        el => el.classList.remove('active')
    );
    
    switchTab('graph'); 
    syncButtons();
}

/* ============================================================================ 
 * Tab Switching
 * ============================================================================
 */
function isStatsTabActive() {
    return document.getElementById('tab-stats').classList.contains('active');
}

function switchTab(mode) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + mode).classList.add('active');

    if (mode === 'stats') {
        canvas.style.display     = 'none';
        statsPanel.style.display = 'block';
        renderStats(current); 
    } else {
        canvas.style.display     = '';   
        statsPanel.style.display = 'none';
    }
}
/* ============================================================================ 
 * Wire pkg:// links inside the SVG
 * ============================================================================
 */
wrapper.addEventListener('click', function(e) {
    const a = e.target.closest('a[*|href^="pkg://"]');
    if (!a) return;
    e.preventDefault();
    e.stopPropagation();
    const href = a.getAttribute('href') || a.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
    switchPackage(href.slice(6));
});

/* ============================================================================ 
 * Sidebar filter
 * ============================================================================
 */
function filterPkgs(q) {
    q = q.toLowerCase();
    document.querySelectorAll('.pkg-item').forEach(el => {
        el.style.display = el.dataset.pkg.toLowerCase().includes(q) ? '' : 'none';
    });
    
    document.querySelectorAll('.pkg-group').forEach(group => {
        const hasVisible = [...group.querySelectorAll('.pkg-item')]
            .some(el => el.style.display !== 'none');
        group.style.display = hasVisible ? '' : 'none';
        if (q && hasVisible) group.open = true;
    });
}


/* ============================================================================ 
 * Keyboard shortcuts
 * ============================================================================
 */
window.addEventListener('keydown', function(e) {
    if (e.altKey && e.key === 'ArrowLeft')  { e.preventDefault(); goBack(); }
    if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); goFwd();  }
});

/* ============================================================================
 * Statistics Configuration & Utilities
 * ============================================================================
 */
Chart.defaults.color        = '#8b949e';
Chart.defaults.borderColor  = '#21262d';
Chart.defaults.font.family  = "'Cascadia Mono', monospace";
Chart.defaults.font.size    = 11;
Chart.defaults.plugins.legend.labels.boxWidth = 10;

const PALETTE = ['#4c9dff','#f0a24b','#6fdd8b','#c97bfc','#ff6b8a','#00d4aa'];

let activeCharts = [];
const destroyCharts = () => { activeCharts.forEach(c => c.destroy()); activeCharts = []; };
const makeChart     = (id, cfg) => {
    const el = document.getElementById(id);
    if (el) activeCharts.push(new Chart(el, cfg));
};

const fmt = (n) => (n ?? 0).toLocaleString();

const edgeData = (ec) => {
    if (!ec?.counts) return { labels: [], data: [] };
    const ent = Object.entries(ec.counts);
    return { labels: ent.map(e => e[0]), data: ent.map(e => e[1]) };
};

const card = (val, lbl, sub, cls = '') => `
    <div class="card ${cls}">
        <div class="card-val">${val}</div>
        <div class="card-lbl">${lbl}</div>
        ${sub ? `<div class="card-sub">${sub}</div>` : ''}
    </div>`;

/* ============================================================================
 * Home Stats Rendering
 * ============================================================================
 */
function renderHomeStats() {
    if (!stats) return '<div class="no-data">No stats JSON provided.</div>';

    const unreach = stats.totalFunctions - stats.reachableFunctions;
    const rPct = stats.totalFunctions ? (stats.reachableFunctions / stats.totalFunctions * 100) : 0;
    const { labels: eLabels, data: eData } = edgeData(stats.grandTotal);
    const pkgs = Object.entries(stats.packages || {}).sort((a, b) => b[1].functionCount - a[1].functionCount);
    
    const ind = stats.indirect || {};
    const indDef = (key) => ind[key] ?? 0;
    const sigEntries = Object.entries(ind.signatureMetrics || {})
    .sort((a, b) => {
        const crossB = b[1].potentialTargets * b[1].actualCallSites;
        const crossA = a[1].potentialTargets * a[1].actualCallSites;
        if (crossB !== crossA) return crossB - crossA;
        return b[1].potentialTargets - a[1].potentialTargets;
    });

    statsPanel.innerHTML = `
    <div class="stats-title">Overview <span class="badge">depth: ${stats.maxDepthSpecified}</span></div>
    <div class="cards">
        ${card(fmt(stats.totalFunctions), 'Total Functions', 'All packages')}
        ${card(fmt(stats.reachableFunctions), 'Reachable', rPct.toFixed(1)+'%', 'c-green')}
        ${card(fmt(ind.staticCallSites), 'Static Calls', 'Direct dispatch', 'c-green')}
        ${card(fmt(stats.grandTotal?.total), 'Total Edges', 'Call graph edges', 'c-purple')}
    </div>

    <div class="stats-title">Thesis Research: Indirect Analysis</div>
    <div class="cards">
        ${card(fmt(ind.interfaceCallSites),   'Interface Calls',  'Virtual dispatch',   'c-blue')}
        ${card(fmt(ind.funcVarCallSites),     'Func Var Calls',   'Dynamic dispatch',   'c-blue')}
        ${card(fmt(ind.funcLiteralStores),    'Literal Stores',   'f := func(){...}',   'c-orange')}
        ${card(fmt(ind.funcNamedStores),      'Named Stores',     'f := namedFunc',     'c-orange')}
        ${card(fmt(ind.funcPropagations),     'Propagations',     'b = a (func copy)',  'c-orange')}
        ${card(fmt(ind.funcInStructOrMap),    'Struct/Map',       'Field or map entry', 'c-orange')}
        ${card(fmt(ind.funcChans),            'Func Channels',    'make(chan F)',        'c-purple')}
        ${card(fmt(ind.goroutinesFuncChan),   'Go Func Chan',     'Goroutine+func chan', 'c-purple')}
        ${card(fmt(ind.funcsSentToFuncChan),  'Chan Sends',       'ch <- funcVal',      'c-purple')}
        ${card(fmt(ind.funcsReceivedForCall), 'Chan Recv Calls',  '<-ch then called',   'c-purple')}
    </div>

    <div class="research-grid">
        <div class="pkg-table-wrap">
            <h3>Signature Cross-Product (sorted by potential x actual)</h3>
            <div class="sig-wrap">
                <table class="sig-table">
                    <thead>
                        <tr>
                            <th>Signature</th>
                            <th class="r">Potential</th>
                            <th class="r">Call Sites</th>
                            <th class="r">Cross-Product</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sigEntries.slice(0, 20).map(([sig, m]) => {
                            const cross = m.potentialTargets * m.actualCallSites;
                            return `<tr>
                                <td><span class="sig-text" title="${sig}">${sig}</span></td>
                                <td class="r">${fmt(m.potentialTargets)}</td>
                                <td class="r">${fmt(m.actualCallSites)}</td>
                                <td class="r">
                                    <span class="${cross > 0 ? 'pill-bad' : 'pill-good'}">
                                        ${fmt(cross)}
                                    </span>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="chart-box">
            <h3>Dispatch Distribution</h3>
            <canvas id="ch-indirect"></canvas>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h3>Edges</h3><canvas id="ch-edges"></canvas>
        </div>
        <div class="chart-box">
            <h3>Reachability</h3>
            <div class="reach-track">
                <div class="reach-green" style="width:${rPct}%"></div>
                <div class="reach-orange" style="width:${100-rPct}%"></div>
            </div>
            <canvas id="ch-pkgs"></canvas>
        </div>
    </div>
    
    <div class="pkg-table-wrap">
        <h3>All Packages</h3>
        <table>
            <thead><tr><th>Package</th><th class="r">Func Count</th><th class="r">Unreach</th></tr></thead>
            <tbody>${pkgs.map(([path, p]) => {
                const u = (p.unusedFunctions||[]).length;
                return `<tr>
                    <td><span class="pkg-link" onclick="switchPackage('${path}',true,true)">${path}</span></td>
                    <td class="r">${fmt(p.functionCount)}</td>
                    <td class="r"><span class="${u>0?'pill-bad':'pill-good'}">${u>0?u:'✓'}</span></td>
                </tr>`;
            }).join('')}</tbody>
        </table>
    </div>`;

    // 1. Edges Doughnut
    makeChart('ch-edges', {
        type: 'doughnut',
        data: { labels: eLabels, datasets: [{ data: eData, backgroundColor: PALETTE }] },
        options: { plugins: { legend: { position: 'right' } } }
    });
    
    // 2. Updated Call Distribution Chart (includes all types)
    makeChart('ch-indirect', {
        type: 'bar',
        data: {
            labels: [
                'Static Calls',
                'Interface Calls',
                'Func Var Calls',
                'Literal Stores',
                'Named Stores',
                'Propagations',
                'Struct/Map',
                'Func Channels',
                'Go+Func Chan',
                'Chan Sends',
                'Chan Recv→Call',
            ],
            datasets: [{
                label: 'Count',
                data: [
                    ind.staticCallSites,
                    ind.interfaceCallSites,
                    ind.funcVarCallSites,
                    ind.funcLiteralStores,
                    ind.funcNamedStores,
                    ind.funcPropagations,
                    ind.funcInStructOrMap,
                    ind.funcChans,
                    ind.goroutinesFuncChan,
                    ind.funcsSentToFuncChan,
                    ind.funcsReceivedForCall,
                ],
                backgroundColor: [
                    '#2ea043',
                    '#4c9dff',
                    '#c97bfc',
                    '#f0a24b',
                    '#f0a24b',
                    '#f0a24b',
                    '#f0a24b',
                    '#ff7b72',
                    '#ff7b72',
                    '#ff7b72',
                    '#ff7b72',
                ],
            }]
        },
        options: {
            autoSkip            : false,
            indexAxis           : 'y',
            maintainAspectRatio : false,
            plugins             : { legend: { display: false } },
            scales              : { x: { beginAtZero: true } },
        }
    });

    // 3. Package Bar Chart
    const top8 = pkgs.slice(0, 8);
    makeChart('ch-pkgs', {
        type: 'bar',
        data: { 
            labels: top8.map(([p]) => p.split('/').pop()),
            datasets: [{ data: top8.map(([,p]) => p.functionCount), backgroundColor: '#4c9dff' }]
        },
        options: { indexAxis: 'y', plugins: { legend: { display: false } } }
    });
}
/* ============================================================================
 * Package Stats Rendering (Corrected)
 * ============================================================================
 */
function renderPkgStats(pkg) {
    const p = stats?.packages?.[pkg];
    if (!p) return '<div class="no-data">Package not found.</div>';

    // 1. Setup Counts
    const unusedList = (p.unusedFunctions || []).slice().sort();
    const totalCount = p.functionCount || 0;
    const unreachCount = unusedList.length;
    const reachCount = totalCount - unreachCount;

    // 2. Calculate Correct Percentages
    // We want the percentage to match the card it's inside of.
    const unreachPct = totalCount ? (unreachCount / totalCount * 100) : 0;
    const reachPct   = totalCount ? (reachCount / totalCount * 100) : 0;

    const { labels: eLabels, data: eData } = edgeData(p.edges);

    // 3. Render HTML
    statsPanel.innerHTML = `
    <div class="stats-title">${pkg}</div>
    <div class="cards">
        ${card(fmt(totalCount), 'Functions', 'In package')}
        
        ${card(fmt(p.edges?.total), 'Edges', 'Calls', 'c-purple')}
        
        ${card(fmt(unreachCount), 'Unreachable', unreachPct.toFixed(1) + '%', 'c-orange')}
        
        ${card(fmt(reachCount), 'Reachable', reachPct.toFixed(1) + '%', 'c-green')}
    </div>

    <div class="chart-row">
        <div class="chart-box" >
            <h3>Edge Kinds</h3>
            ${eData.length ? '<canvas id="ch-pkg-edges"></canvas>' : '<div class="no-data">None</div>'}
        </div>
        <div class="chart-box">
            <h3>Unreachable List (${unreachCount})</h3>
            <div class="unused-list">
                ${unusedList.map(f => `<div class="unused-fn">${f}</div>`).join('')}
                ${unreachCount === 0 ? '<div class="no-issues">✓ Clean</div>' : ''}
            </div>
        </div>
    </div>`;

    // 4. Initialize Chart
    if (eData.length) {
        makeChart('ch-pkg-edges', {
            type: 'doughnut',
            data: { 
                labels: eLabels, 
                datasets: [{ 
                    data: eData, 
                    backgroundColor: PALETTE 
                }] 
            },
            options: { 
                plugins: { 
                    legend: { position: 'right' } 
                } 
            }
        });
    }
}
</script>
